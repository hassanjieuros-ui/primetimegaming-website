    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -4;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 8%, rgba(57,255,20,.20), transparent 38%),
        radial-gradient(circle at 8% 35%, rgba(57,255,20,.13), transparent 31%),
        radial-gradient(circle at 92% 35%, rgba(57,255,20,.13), transparent 31%),
        repeating-linear-gradient(90deg, rgba(57,255,20,.035) 0 1px, transparent 1px 64px),
        repeating-linear-gradient(0deg, rgba(57,255,20,.025) 0 1px, transparent 1px 44px);
      mix-blend-mode: screen;
      opacity: .72;
    }

    #matrix {
      position: fixed;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      opacity: .36;
      mix-blend-mode: screen;
    }

    .scanlines {
      position: fixed;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      background: repeating-linear-gradient(0deg, rgba(255,255,255,.025) 0 1px, transparent 1px 4px);
      opacity: .34;
      animation: scan 7s linear infinite;
    }

    .sweep {
      position: fixed;
      inset: 0;
      z-index: 4;
      pointer-events: none;
      background: linear-gradient(110deg, transparent 0%, transparent 44%, rgba(86,255,38,.18) 49%, transparent 56%, transparent 100%);
      transform: translateX(-125%);
      mix-blend-mode: screen;
      animation: sweep 9s ease-in-out infinite;
    }

    @keyframes scan { to { transform: translateY(22px); } }
    @keyframes sweep {
      0%, 62% { transform: translateX(-125%); opacity: 0; }
      68% { opacity: 1; }
      82% { transform: translateX(125%); opacity: 0; }
      100% { transform: translateX(125%); opacity: 0; }
    }

    .page-shell {
      width: 100%;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 0;
    }

    .poster-wrap {
      position: relative;
      width: min(100vw, var(--site-max));
      margin: 0 auto;
      background: #000;
      box-shadow:
        0 0 0 1px rgba(57,255,20,.18),
        0 0 60px rgba(57,255,20,.14),
        0 0 180px rgba(57,255,20,.08);
      overflow: hidden;
      isolation: isolate;
    }

    .poster-wrap::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      background:
        linear-gradient(90deg, rgba(57,255,20,.18), transparent 12%, transparent 88%, rgba(57,255,20,.18)),
        linear-gradient(180deg, rgba(57,255,20,.08), transparent 18%, transparent 86%, rgba(57,255,20,.08));
      mix-blend-mode: screen;
      opacity: .55;
    }

    .poster-wrap::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      background: repeating-linear-gradient(0deg, transparent 0 5px, rgba(57,255,20,.09) 6px, transparent 7px);
      opacity: .18;
      animation: posterScan 10s linear infinite;
    }

    @keyframes posterScan { to { transform: translateY(21px); } }

    .approved-design {
      display: block;
      width: 100%;
      height: auto;
      position: relative;
      z-index: 1;
      user-select: none;
      -webkit-user-drag: none;
    }

    .hotspot {
      position: absolute;
      z-index: 10;
      display: block;
      border-radius: 10px;
      outline: none;
    }

    .hotspot:hover {
      background: rgba(57,255,20,.07);
      box-shadow: 0 0 22px rgba(57,255,20,.45);
    }

    /* Coordinates are percentages of the approved 1024x1536 design. */
    .hs-home { left: 31.8%; top: 2.1%; width: 4.9%; height: 3.3%; }
    .hs-events { left: 38.2%; top: 2.1%; width: 6.5%; height: 3.3%; }
    .hs-tournaments { left: 45.6%; top: 2.1%; width: 10.7%; height: 3.3%; }
    .hs-rankings { left: 57.6%; top: 2.1%; width: 7.7%; height: 3.3%; }
    .hs-about { left: 66.8%; top: 2.1%; width: 5.9%; height: 3.3%; }
    .hs-contact-top { left: 73.2%; top: 2.1%; width: 7.4%; height: 3.3%; }
    .hs-discord { left: 85.4%; top: 1.8%; width: 3.8%; height: 3.5%; }
    .hs-twitch { left: 90.0%; top: 1.8%; width: 3.8%; height: 3.5%; }
    .hs-twitter { left: 94.3%; top: 1.8%; width: 4.0%; height: 3.5%; }
    .hs-notify { left: 36.4%; top: 52.5%; width: 27.7%; height: 4.9%; }
    .hs-discord-card { left: 69.1%; top: 75.8%; width: 6.3%; height: 5.1%; }
    .hs-twitch-card { left: 78.0%; top: 75.8%; width: 6.3%; height: 5.1%; }
    .hs-twitter-card { left: 86.5%; top: 75.8%; width: 6.3%; height: 5.1%; }
    .hs-email { left: 71.2%; top: 83.3%; width: 22.0%; height: 3.0%; }

    .mobile-spacer { display: none; }

    @media (min-width: 1800px) {
      :root { --site-max: 1640px; }
    }

    @media (max-width: 900px) {
      #matrix { opacity: .22; }
      .poster-wrap {
        width: 100vw;
        box-shadow: none;
      }
      .hotspot:hover { background: transparent; box-shadow: none; }
    }

    @media (max-width: 540px) {

  <script>
    (function () {
      const canvas = document.getElementById('matrix');
      const ctx = canvas.getContext('2d');
      const chars = '01 PRIME TIME GAMING EVENTS TOURNAMENTS RANKINGS '; 
      let columns = [];
      let fontSize = 16;
      let width = 0;
      let height = 0;

      function resize() {
        const ratio = Math.min(window.devicePixelRatio || 1, 2);
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = Math.floor(width * ratio);
        canvas.height = Math.floor(height * ratio);
        canvas.style.width = width + 'px';
        canvas.style.height = height + 'px';
        ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
        fontSize = width < 600 ? 12 : 16;
        const count = Math.ceil(width / fontSize);
        columns = Array.from({ length: count }, () => Math.random() * -height);
      }

      function draw() {
        ctx.clearRect(0, 0, width, height);
        ctx.fillStyle = 'rgba(0,0,0,0.045)';
        ctx.fillRect(0, 0, width, height);
        ctx.font = fontSize + 'px monospace';
        ctx.fillStyle = 'rgba(57,255,20,.58)';
        ctx.shadowColor = 'rgba(57,255,20,.65)';
        ctx.shadowBlur = 10;
        for (let i = 0; i < columns.length; i++) {
          const text = chars[Math.floor(Math.random() * chars.length)];
          const x = i * fontSize;
          const y = columns[i];
          ctx.fillText(text, x, y);
          columns[i] = y > height + Math.random() * 1000 ? Math.random() * -240 : y + fontSize * (0.55 + Math.random() * 0.45);
        }
        requestAnimationFrame(draw);
      }

      window.addEventListener('resize', resize, { passive: true });
      resize();
      draw();
    })();
  </script>
