<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Prime Time Gaming | Coming Soon</title>
  <meta name="description" content="Prime Time Gaming is almost here. Events, tournaments, community, rankings, and competitive gaming updates coming soon." />
  <meta name="theme-color" content="#39ff14" />
  <meta property="og:title" content="Prime Time Gaming | Coming Soon" />
  <meta property="og:description" content="A new era of competitive gaming is on the horizon. Tournaments. Community. Legends." />
  <meta property="og:type" content="website" />
  <style>
    :root {
      --green: #39ff14;
      --bg: #000;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #000;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      display: block;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .page {
      position: relative;
      width: 100%;
      max-width: none;
      margin: 0;
      background: #000;
      box-shadow: 0 0 90px rgba(57, 255, 20, 0.16);
    }

    /* Full-bleed mode: the approved art scales to the browser width instead of sitting in a centered 1024px column. */

    .approved-art {
      display: block;
      width: 100%;
      max-width: none;
      height: auto;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* Clickable overlay zones placed over the approved visual mockup. */
    .hotspot {
      position: absolute;
      display: block;
      border-radius: 10px;
      text-decoration: none;
      color: transparent;
      font-size: 0;
      outline: none;
    }

    .hotspot:focus-visible {
      box-shadow: 0 0 0 3px rgba(57, 255, 20, .9), 0 0 24px rgba(57, 255, 20, .7);
    }

    .notify {
      left: 36.7%;
      top: 52.75%;
      width: 27.2%;
      height: 3.75%;
    }

    .email {
      left: 70.7%;
      top: 83.25%;
      width: 22%;
      height: 2.4%;
    }

    .home { left: 31.8%; top: 1.9%; width: 4.3%; height: 3%; }
    .events { left: 38.1%; top: 1.9%; width: 5.4%; height: 3%; }
    .tournaments { left: 45.1%; top: 1.9%; width: 10.4%; height: 3%; }
    .rankings { left: 57.0%; top: 1.9%; width: 7.2%; height: 3%; }
    .about { left: 66.0%; top: 1.9%; width: 5.3%; height: 3%; }
    .contact { left: 73.3%; top: 1.9%; width: 6.4%; height: 3%; }

    .discord { left: 84.2%; top: 1.7%; width: 3.0%; height: 3%; }
    .twitch { left: 88.0%; top: 1.7%; width: 3.0%; height: 3%; }
    .twitter { left: 91.7%; top: 1.7%; width: 3.0%; height: 3%; }

    @media (max-width: 600px) {
      .page {
        width: 100%;
        box-shadow: none;
      }

      .matrix-canvas,
      .scanlines,
      .vignette,
      .energy-sweep,
      .green-fog,
      .spark-field,
      .corner-glow {
        opacity: .78;
      }
    }

    @media (min-width: 1025px) {
      body {
        background:
          radial-gradient(circle at 50% 12%, rgba(57,255,20,.12), transparent 34%),
          radial-gradient(circle at 50% 90%, rgba(57,255,20,.07), transparent 38%),
          #000;
      }
    }


    /* Motion layer: keeps the approved visual intact while adding live energy on top. */
    .approved-art {
      position: relative;
      z-index: 1;
      filter: saturate(1.04) contrast(1.02);
    }

    .motion-frame,
    .matrix-canvas,
    .scanlines,
    .vignette,
    .energy-sweep,
    .green-fog,
    .spark-field,
    .corner-glow {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
    }

    .motion-frame { z-index: 2; }

    .matrix-canvas {
      opacity: .16;
      mix-blend-mode: screen;
    }

    .scanlines {
      z-index: 3;
      opacity: .18;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.045) 0px,
        rgba(255,255,255,.045) 1px,
        rgba(0,0,0,0) 2px,
        rgba(0,0,0,0) 5px
      );
      animation: scanDrift 7s linear infinite;
    }

    .vignette {
      z-index: 4;
      background:
        radial-gradient(circle at 50% 18%, rgba(57,255,20,.12), transparent 28%),
        radial-gradient(circle at 50% 55%, rgba(57,255,20,.065), transparent 38%),
        radial-gradient(circle at 50% 100%, rgba(57,255,20,.1), transparent 32%),
        linear-gradient(90deg, rgba(0,0,0,.45), transparent 17%, transparent 83%, rgba(0,0,0,.45));
      mix-blend-mode: screen;
      opacity: .65;
      animation: neonBreath 5.5s ease-in-out infinite;
    }

    .energy-sweep {
      z-index: 5;
      opacity: .75;
      background: linear-gradient(
        100deg,
        transparent 0%,
        transparent 42%,
        rgba(57,255,20,.08) 48%,
        rgba(185,255,175,.35) 50%,
        rgba(57,255,20,.08) 52%,
        transparent 58%,
        transparent 100%
      );
      transform: translateX(-120%);
      animation: energySweep 7.8s ease-in-out infinite;
      mix-blend-mode: screen;
    }

    .green-fog {
      z-index: 2;
      opacity: .42;
      background:
        radial-gradient(ellipse at 20% 42%, rgba(57,255,20,.14), transparent 26%),
        radial-gradient(ellipse at 80% 46%, rgba(57,255,20,.12), transparent 27%),
        radial-gradient(ellipse at 50% 72%, rgba(57,255,20,.10), transparent 30%);
      filter: blur(18px);
      animation: fogShift 11s ease-in-out infinite alternate;
      mix-blend-mode: screen;
    }

    .spark-field::before,
    .spark-field::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle, rgba(57,255,20,.9) 0 1px, transparent 1.5px),
        radial-gradient(circle, rgba(255,255,255,.42) 0 1px, transparent 1.5px);
      background-size: 122px 122px, 177px 177px;
      background-position: 0 0, 48px 33px;
      opacity: .18;
      animation: sparksFloat 13s linear infinite;
      mix-blend-mode: screen;
    }

    .spark-field::after {
      background-size: 91px 91px, 223px 223px;
      animation-duration: 19s;
      animation-direction: reverse;
      opacity: .12;
    }

    .corner-glow {
      z-index: 6;
      opacity: .55;
      background:
        linear-gradient(90deg, rgba(57,255,20,.35), transparent 14%) top left / 100% 2px no-repeat,
        linear-gradient(180deg, rgba(57,255,20,.25), transparent 9%) top left / 2px 100% no-repeat,
        linear-gradient(270deg, rgba(57,255,20,.30), transparent 14%) bottom right / 100% 2px no-repeat,
        linear-gradient(0deg, rgba(57,255,20,.20), transparent 9%) bottom right / 2px 100% no-repeat;
      animation: borderPulse 4s ease-in-out infinite;
      mix-blend-mode: screen;
    }

    .hotspot {
      z-index: 20;
    }

    .notify::before {
      content: "";
      position: absolute;
      inset: -2px;
      border: 1px solid rgba(57,255,20,.65);
      border-radius: 8px;
      box-shadow: 0 0 14px rgba(57,255,20,.32), inset 0 0 16px rgba(57,255,20,.10);
      animation: notifyPulse 2.35s ease-in-out infinite;
    }

    .notify::after {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      width: 28%;
      left: -35%;
      border-radius: 10px;
      background: linear-gradient(90deg, transparent, rgba(208,255,198,.32), transparent);
      transform: skewX(-18deg);
      animation: buttonSweep 3.6s ease-in-out infinite;
    }

    .discord,
    .twitch,
    .twitter,
    .home,
    .events,
    .tournaments,
    .rankings,
    .about,
    .contact,
    .email {
      transition: box-shadow .2s ease, background-color .2s ease;
    }

    .discord:hover,
    .twitch:hover,
    .twitter:hover,
    .home:hover,
    .events:hover,
    .tournaments:hover,
    .rankings:hover,
    .about:hover,
    .contact:hover,
    .email:hover {
      background-color: rgba(57,255,20,.08);
      box-shadow: 0 0 18px rgba(57,255,20,.35);
    }

    @keyframes scanDrift {
      from { transform: translateY(0); }
      to { transform: translateY(40px); }
    }

    @keyframes neonBreath {
      0%, 100% { opacity: .52; }
      50% { opacity: .82; }
    }

    @keyframes energySweep {
      0%, 63% { transform: translateX(-125%); opacity: 0; }
      70% { opacity: .85; }
      83% { transform: translateX(125%); opacity: .3; }
      100% { transform: translateX(125%); opacity: 0; }
    }

    @keyframes fogShift {
      from { transform: translate3d(-2.5%, -1%, 0) scale(1); }
      to { transform: translate3d(2.5%, 1.5%, 0) scale(1.03); }
    }

    @keyframes sparksFloat {
      from { transform: translateY(0); }
      to { transform: translateY(-180px); }
    }

    @keyframes borderPulse {
      0%, 100% { opacity: .28; filter: blur(.2px); }
      50% { opacity: .72; filter: blur(0); }
    }

    @keyframes notifyPulse {
      0%, 100% { opacity: .55; box-shadow: 0 0 12px rgba(57,255,20,.22), inset 0 0 14px rgba(57,255,20,.08); }
      50% { opacity: 1; box-shadow: 0 0 26px rgba(57,255,20,.58), inset 0 0 20px rgba(57,255,20,.18); }
    }

    @keyframes buttonSweep {
      0%, 45% { left: -35%; opacity: 0; }
      55% { opacity: 1; }
      82% { left: 110%; opacity: 0; }
      100% { left: 110%; opacity: 0; }
    }

    @media (prefers-reduced-motion: reduce) {
      .matrix-canvas,
      .scanlines,
      .vignette,
      .energy-sweep,
      .green-fog,
      .spark-field,
      .corner-glow,
      .notify::before,
      .notify::after {
        animation: none !important;
      }
    }

  </style>
</head>

  <script>
    (function () {
      const reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (reduceMotion) return;

      const page = document.querySelector('.page');
      const canvas = document.getElementById('matrixCanvas');
      const art = document.querySelector('.approved-art');
      if (!page || !canvas || !art) return;

      const ctx = canvas.getContext('2d', { alpha: true });
      let width = 0;
      let height = 0;
      let dpr = Math.min(window.devicePixelRatio || 1, 2);
      let fontSize = 16;
      let columns = 0;
      let drops = [];
      let frame = 0;
      const glyphs = '0101011010010110 PRIME TIME GAMING EVENTS RANKINGS';

      function resize() {
        const rect = page.getBoundingClientRect();
        width = Math.max(1, Math.floor(rect.width));
        height = Math.max(1, Math.floor(page.scrollHeight));
        dpr = Math.min(window.devicePixelRatio || 1, 2);
        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);
        canvas.style.width = width + 'px';
        canvas.style.height = height + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        fontSize = Math.max(10, Math.round(width / 68));
        columns = Math.ceil(width / fontSize);
        drops = Array.from({ length: columns }, () => Math.random() * -height / fontSize);
      }

      function draw() {
        frame += 1;
        requestAnimationFrame(draw);
        if (frame % 3 !== 0) return;

        ctx.fillStyle = 'rgba(0, 0, 0, 0.105)';
        ctx.fillRect(0, 0, width, height);
        ctx.font = fontSize + 'px monospace';
        ctx.textAlign = 'center';
        ctx.shadowColor = 'rgba(57, 255, 20, .65)';
        ctx.shadowBlur = 8;

        for (let i = 0; i < drops.length; i++) {
          const x = i * fontSize;
          const y = drops[i] * fontSize;
          const char = glyphs[Math.floor(Math.random() * glyphs.length)];
          const alpha = Math.random() > .985 ? .95 : .38;
          ctx.fillStyle = 'rgba(57, 255, 20, ' + alpha + ')';
          ctx.fillText(char, x, y);

          if (y > height && Math.random() > .982) drops[i] = 0;
          drops[i] += Math.random() * .48 + .2;
        }
      }

      function boot() {
        resize();
        ctx.clearRect(0, 0, width, height);
        draw();
      }

      if (art.complete) boot();
      else art.addEventListener('load', boot, { once: true });

      window.addEventListener('resize', resize, { passive: true });
    })();
  </script>
